<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIS FINALE II - 官方直播抽選</title>
    <style>
        /* 整個網頁的底色與基礎排版 */
        body {
            background-image: url('bg.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 抽選結果文字樣式 */
        .result-box {
            font-size: 42px; 
            font-weight: bold;
            color: #8c0000;      
            margin-bottom: 20px;
            text-align: center;
            min-height: 65px;   
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff; 
        }
        /* 抽選按鈕樣式 */
        .draw-btn {
            background-color: #8c0000;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 55px;
            border: 2px solid #000;
            border-radius: 30px; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }

        .draw-btn:hover {
            background-color: #b30000;
            transform: scale(1.05); 
        }

        .draw-btn:active {
            transform: scale(0.98); 
        }

        .draw-btn:disabled {
            background-color: #777;
            border-color: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* 數據看板大盒子 */
        .dashboard {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.85); 
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-box {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-box span {
            color: #8c0000;
            font-size: 18px;
        }

        /* 中獎歷史紀錄區 */
        .history-title {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #8c0000;
            letter-spacing: 2px;
        }

        .history-box {
            margin-top: 10px;
            width: 350px;
            min-height: 50px;
            background: rgba(255, 255, 255, 0.85);
            border: 2px dashed #8c0000;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            line-height: 1.8;
        }

        /* 自訂官方防呆警告彈窗 */
        .custom-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #eef2f5;
            border: 3px solid #8c0000; 
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            margin: 0 0 15px 0;
            color: #8c0000;
            font-size: 22px;
        }

        .modal-content p {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .modal-btn {
            background: #8c0000;
            color: white;
            border: none;
            padding: 8px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-btn:hover { background: #b30000; }

    </style>
</head>
<body>

    <!-- LOGO 獨立圖片 -->

    <div style="font-size: 80px; font-weight: bold; color: #8c0000; margin-bottom: 15px; text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff;">宙光回饋表單抽獎</div>

    <img src="logo01.png" alt="AETHERIS FINALE II LOGO" style="max-width: 900px; width: 100%; height: auto; margin-bottom: -100px; transform: translateX(58px);">

    <!-- 抽選結果顯示區 -->
    <div class="result-box" id="resultDisplay">中獎名單</div>

    <!-- 抽選按鈕 -->
    <button class="draw-btn" id="luckyBtn">抽選</button>

    <!-- 直播數據看板區 -->
    <div class="dashboard">
        <div class="stat-box">名單總人數：<span id="totalCount">0</span> 人</div>
        <div class="stat-box">已抽出：<span id="drawnCount">0</span> / 20 人</div>
        <div class="stat-box">剩餘人數：<span id="remainingCount">0</span> 人</div>
    </div>

    <!-- 中獎名單歷史紀錄區 -->
    <div class="history-title">🏆 中獎名單 🏆</div>
    <div class="history-box" id="historyList">（目前尚無中獎者）</div>

    <!-- 自訂的官方防呆警告彈窗 -->
    <div class="custom-modal" id="alertModal">
        <div class="modal-content">
            <h3 id="modalTitle">🛑 系統提示</h3>
            <p id="modalMessage">訊息內容</p>
            <button class="modal-btn" id="modalCloseBtn">確定</button>
        </div>
    </div>

    <!-- JavaScript 核心大腦 -->
    <script>
        // 🎯 這裡已經幫你把「反引號」和「名單」全部完美拼好，字體絕對會是漂亮的橘黃色！
        const rawExcelData = `
請輸入您的暱稱
ボミ
格雷伯爵紅22222
レリ—ズ
鴨梨
Zone
炎頭隊長沙福林
小冰冰
カエル
Kiwie
硫酸
說好了打一輩子窩塔藝喔
盧湘鈴
好想吃拉麵
化石
天狐
陳致勝
艾朕空
ZK
章魚虛
響
星爆
`;

        // 原始名單解析與過濾
        const originalList = rawExcelData
            .split('\n')
            .map(name => name.trim())
            .filter(name => name !== "" && name !== "請輸入您的暱稱");

        // 複製一份作為動態抽籤池
        let activePool = originalList.slice();
        
        // 用來記錄已中獎的人
        let winnersList = [];

        // 取得網頁上的 HTML 元素
        const luckyBtn = document.getElementById('luckyBtn');
        const resultDisplay = document.getElementById('resultDisplay');
        const totalCount = document.getElementById('totalCount');
        const drawnCount = document.getElementById('drawnCount');
        const remainingCount = document.getElementById('remainingCount');
        const historyList = document.getElementById('historyList');
        const alertModal = document.getElementById('alertModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        // 打開彈窗功能
        function showCustomAlert(title, message) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            alertModal.style.display = 'flex'; 
        }

        // 關閉彈窗功能
        modalCloseBtn.addEventListener('click', () => {
            alertModal.style.display = 'none';
        });

        // 刷新數據看板
        function updateDashboard() {
            totalCount.textContent = originalList.length;      
            drawnCount.textContent = winnersList.length;       
            remainingCount.textContent = activePool.length;    
            
            if (winnersList.length > 0) {
                historyList.textContent = winnersList.join(' 、 ');
            } else {
                historyList.textContent = "（目前尚無中獎者）";
            }
        }

        // 網頁開啟時先刷新一次初始數據
        updateDashboard();

        // 監聽按鈕點擊事件
        luckyBtn.addEventListener('click', () => {
            
            // 防護一：如果已經抽滿 20 個人了
            if (winnersList.length >= 20) {
                resultDisplay.textContent = "🛑 已抽滿 20 人！";
                showCustomAlert("🛑 抽選完畢", "今天預計抽 20 人的名額已經全部抽完囉！");
                return;
            }

            // 防護二：如果名單空了
            if (activePool.length === 0) {
                resultDisplay.textContent = "❌ 名單已全數抽完！";
                showCustomAlert("❌ 人數不足", "名單人數不足，抽籤池已經空囉！");
                return;
            }
            
            luckyBtn.disabled = true; 
            let counter = 0;
            
            // 啟動拉霸特效
            const shuffleInterval = setInterval(() => {
                const tempIndex = Math.floor(Math.random() * activePool.length);
                resultDisplay.textContent = activePool[tempIndex];
                counter++;
                
                if (counter > 25) {
                    clearInterval(shuffleInterval);
                    
                    // 決定最終真正的幸運得主
                    const finalIndex = Math.floor(Math.random() * activePool.length);
                    const winner = activePool[finalIndex];
                    
                    // 顯示中獎名字
                    resultDisplay.textContent = winner;
                    
                    // 從抽籤池剪掉中獎者
                    activePool.splice(finalIndex, 1);
                    
                    // 把得主塞進已中獎陣列
                    winnersList.push(winner);
                    
                    // 即時刷新數字與中獎名單看板
                    updateDashboard();
                    
                    luckyBtn.disabled = false; 
                }
            }, 50);
        });

        // 防範 F5 誤觸
        window.addEventListener('beforeunload', (event) => {
            event.preventDefault();
        });
    </script>
</body>
</html>
